name: Otomatik Analiz Raporu

on:
  schedule:
    # Hafta içi (Pazartesi-Cuma), Türkiye saatiyle: 10:00, 11:00, 13:00, 15:00, 17:00, 20:00
    # (Türkiye UTC+3, yaz-kış saati uygulaması yok, bu yüzden UTC karşılıkları sabit: 07,08,10,12,14,17)
    - cron: '0 7,8,10,12,14,17 * * 1-5'
  workflow_dispatch:
    inputs:
      secim:
        description: "Analiz Türü"
        required: true
        default: "HER IKISI"
        type: choice
        options:
          - "HER IKISI"
          - "BIST"
          - "FON"
      periyot:
        description: "Periyot"
        required: true
        default: "1d"
        type: choice
        options:
          - "1d"
          - "1wk"
          - "1mo"
          - "1h"
          - "2h"
          - "4h"

jobs:
  rapor-uret:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Repo'yu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gereksinimleri kur
        run: pip install -r requirements.txt

      - name: Raporu üret
        env:
          SECIM: ${{ github.event.inputs.secim }}
          PERIYOT: ${{ github.event.inputs.periyot }}
          PYTHONUNBUFFERED: "1"
        run: python scheduled_run.py

      - name: Değişiklikleri commit'le
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Otomatik rapor güncellendi"
          file_pattern: "raporlar/*.csv"
