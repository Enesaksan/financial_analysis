name: Otomatik Analiz Raporu

on:
  schedule:
    # Hafta ici (Pazartesi-Cuma), Turkiye saatiyle: 10:00, 12:00, 14:00, 16:00, 17:00, 20:00 -> GUNLUK (1d) analiz
    # (Turkiye UTC+3, yaz-kis saati uygulamasi yok, bu yuzden UTC karsiliklari sabit)
    - cron: '15 7,9,11,13,14,17 * * 1-5'
    # Sadece Cuma, Turkiye saatiyle 20:30 -> HAFTALIK (1wk) analiz (gunluk 20:15 kosumundan 15 dk sonra)
    - cron: '30 17 * * 5'
  workflow_dispatch:
    inputs:
      secim:
        description: "Analiz Turu"
        required: true
        default: "HEPSI"
        type: choice
        options:
          - "HEPSI"
          - "BIST"
          - "FON"
          - "ABD"
      periyot:
        description: "Periyot"
        required: true
        default: "1d"
        type: choice
        options:
          - "1d"
          - "1wk"

jobs:
  rapor-uret:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Repo'yu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Gereksinimleri kur
        run: pip install -r requirements.txt

      - name: Raporu uret
        env:
          SECIM: ${{ github.event.inputs.secim }}
          PERIYOT: ${{ github.event.inputs.periyot }}
          GITHUB_SCHEDULE: ${{ github.event.schedule }}
          PYTHONUNBUFFERED: "1"
        run: python scheduled_run.py

      - name: Degisiklikleri commit'le
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Otomatik rapor guncellendi"
          file_pattern: "raporlar/*.csv raporlar/*.txt raporlar/gecmis/*.csv"
